amcl:
  ros__parameters:
    use_sim_time: false

    # Filter
    min_particles: 500
    max_particles: 2000
    alpha_slow: 0.001
    alpha_fast: 0.1
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0

    # Laser model
    laser_model_type: likelihood_field
    laser_max_range: 13.4
    laser_min_range: 0.1
    max_beams: 60
    z_hit: 0.5
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.5
    sigma_hit: 0.2
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0

    # Odometry model — omni-corrected for mecanum
    robot_model_type: nav2_amcl::OmniMotionModel
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.1

    # Frames
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    tf_broadcast: true
    transform_tolerance: 1.0

    # Update thresholds
    update_min_d: 0.1
    update_min_a: 0.2
    resample_interval: 1

    # Scan topic
    scan_topic: /scan

    # Initial pose (origin — override via /initialpose in RViz)
    set_initial_pose: true
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_z: 0.0
    initial_pose_yaw: 0.0
    always_reset_initial_pose: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ''

map_server_lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names: ['map_server', 'amcl']
    bond_timeout: 4.0
