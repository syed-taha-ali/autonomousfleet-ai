### robot_localization EKF for AutonomousFleet AI (MentorPi M1 mecanum)
# Input sources:
#   odom0 = /odom_raw       (body-frame vx, vy, vyaw from mecanum IK)
#   imu0  = /imu            (yaw + vyaw from imu_complementary_filter)
# Frame names are plain REP-105.
ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 2.0
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.2
    print_diagnostics: false
    debug: false
    publish_acceleration: false
    publish_tf: true
    permit_corrected_publication: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    odom0: /odom_raw
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 2
    odom0_differential: false
    odom0_relative: false
    odom0_nodelay: false

    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: false
    imu0_nodelay: false

    use_control: false

